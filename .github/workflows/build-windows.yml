name: Build Windows installer

# Windows Imager v1 마일스톤(#12) — 1차는 NSIS(Windows)만. Mac/Linux 빌드는
# 그 확장 시점에 별도 workflow로 추가.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run electron:build:win

      - uses: actions/upload-artifact@v4
        with:
          name: clawlink-imager-windows
          path: dist-electron/*.exe
          if-no-files-found: error
